{% set name = "cryoswath" %}
{% set version = "0.2.5.post1" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/cryoswath-{{ version }}.tar.gz
  sha256: f226de7557e9fd21c9b64746b1db829f09b6ba665726a1b25682b9fe22ae8c27

build:
  entry_points:
    - cryoswath-init = cryoswath.misc:init_project
    - cryoswath-update-netrc = cryoswath.misc:update_netrc_cli
    - cryoswath-update-tracks = cryoswath.misc:update_track_database
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - flit-core >=3.2
    - pip
  run:
    - python >={{ python_min }}
    - bottleneck
    - dask-core
    - defusedxml
    - geopandas >=1.0.1
    - gitpython
    - h5netcdf
    - h5py
    - keyring
    - matplotlib-base
    - numpy
    - packaging
    - pandas >=2,<3
    - pyarrow
    - pyogrio
    - pyproj
    - pystac-client
    - pytables
    - python-dateutil
    - rasterio
    - rioxarray
    - scikit-learn
    - scipy
    - shapely
    - stackstac
    - statsmodels
    - tqdm
    - xarray >=2025.3
    - zarr

test:
  source_files:
    - tests
  imports:
    - cryoswath
  commands:
    - pip check
    - python -m pytest -q tests/test_*
  requires:
    - python {{ python_min }}
    - pip
    - pytest

about:
  home: https://github.com/j-haacker/cryoswath
  summary: Swath processing toolbox for CryoSat-2
  description: |
    cryoswath is a python package containing processing pipelines, a tool
    library, and some pre-assembled data to retrieve and study CryoSat-2
    data.
    Adaptability lies at its core. The user can access many options simply
    by passing arguments to functions; everything else can be customized
    changing the concerned function or adding a new one.
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  doc_url: https://cryoswath.readthedocs.io/

extra:
  recipe-maintainers:
    - j-haacker
